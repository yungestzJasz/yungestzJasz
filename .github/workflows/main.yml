name: generate animation

on:
  # Esegue l'azione ogni 24 ore
  schedule:
    - cron: "0 */24 * * *" 
  
  # Permette di lanciare l'azione manualmente
  workflow_dispatch:
  
  # Esegue l'azione a ogni push sul ramo main
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Genera il gioco del serpente dai contributi dell'utente
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: tuo-username
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Carica i file generati in un ramo chiamato 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
